# Stream router peer manifest.
#
# One entry per sibling skill in the Stream pack. The router (skills/stream/SKILL.md)
# and RULES.md reference this file as the single source of truth for:
#   - Glob path used to detect whether a peer is installed.
#   - Install command used when a peer is missing.
#   - Install policy: every peer is "silent" - the router installs it on demand with
#     no prompt. Installing the `stream` router alone is enough; it pulls in whatever
#     sub-skill a task needs. ("ask" remains a valid schema value but is unused.)
#   - Routing signals (platform packs only): tokens that, when seen in user input
#     or detected in the cwd, indicate the user wants this pack.
#
# Schema: peers.schema.json (sibling file). Validate with any JSON Schema validator
# after converting YAML -> JSON.
#
# Adding a new peer pack:
#   1. Append an entry below.
#   2. If the pack is platform-specific, add tokens to `signals`. Keep
#      `install_policy: silent` so the router auto-installs it on demand.
#   3. Add it to the Quick-navigation menu and "By task" prose in
#      skills/stream/SKILL.md. The Pick-a-track classifier reads this file at
#      runtime - no code change needed for routing itself.

peers:
  - name: stream-cli
    glob: ~/.claude/skills/stream-cli/SKILL.md
    install: npx skills add GetStream/agent-skills --s stream-cli -y
    install_policy: silent
    purpose: Query Stream data via CLI; run stream api / config / auth; install the Stream CLI.

  - name: stream-docs
    glob: ~/.claude/skills/stream-docs/SKILL.md
    install: npx skills add GetStream/agent-skills --s stream-docs -y
    install_policy: silent
    purpose: Search live Stream SDK documentation (Chat/Video/Feeds/Moderation across React, iOS, Android, Node, Flutter, Unity).

  - name: stream-builder
    glob: ~/.claude/skills/stream-builder/SKILL.md
    install: npx skills add GetStream/agent-skills --s stream-builder -y
    install_policy: silent
    purpose: Scaffold a new web (Next.js) app with Stream, or integrate Chat/Video/Feeds/Moderation into an existing one.

  - name: stream-swift
    glob: ~/.claude/skills/stream-swift/SKILL.md
    install: npx skills add GetStream/agent-skills --s stream-swift -y
    install_policy: silent
    purpose: Build or integrate Stream Chat/Video/Feeds in Swift/SwiftUI/UIKit/iOS apps. Includes package setup, auth wiring, and view blueprints.
    signals:
      - swift
      - swiftui
      - uikit
      - ios
      - xcode
      - .xcodeproj
      - Package.swift

  - name: stream-android
    glob: ~/.claude/skills/stream-android/SKILL.md
    install: npx skills add GetStream/agent-skills --s stream-android -y
    install_policy: silent
    purpose: Build or integrate Stream Chat/Video/Feeds in Android/Jetpack Compose apps. Includes package setup, auth wiring, and screen blueprints.
    signals:
      - android
      - jetpack compose
      - jetpack
      - compose
      - kotlin
      - android studio
      - gradle
      - .gradle
      - build.gradle

  - name: stream-flutter
    glob: ~/.claude/skills/stream-flutter/SKILL.md
    install: npx skills add GetStream/agent-skills --s stream-flutter -y
    install_policy: ask
    purpose: Build or integrate Stream Chat in Flutter apps. Includes pubspec setup, auth wiring, and widget blueprints for stream_chat_flutter and stream_chat_flutter_core.
    signals:
      - flutter
      - dart
      - pubspec.yaml
      - stream_chat_flutter
      - stream_chat_flutter_core
      - chat flutter
    fallback_on_decline: stream-docs

  - name: stream-react-native
    glob: ~/.claude/skills/stream-react-native/SKILL.md
    install: npx skills add GetStream/agent-skills --s stream-react-native -y
    install_policy: silent
    purpose: Create, build, or integrate Stream Chat and Stream Video React Native in React Native CLI and Expo apps. Includes package setup, auth wiring, calling lifecycle, and Chat/Video UI blueprints.
    signals:
      - react native
      - react-native
      - rn cli
      - expo
      - expo router
      - expo-router
      - stream-chat-react-native
      - stream-chat-expo
      - chat react native
      - stream chat rn
      - "@stream-io/video-react-native-sdk"
      - stream video react native
      - stream video rn
      - video rn
      - video react native
      - video call react native
      - livestream react native
      - audio room react native
